# nginx.conf
events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # 1. Webフロントエンド (ポート 80)
    server {
        listen 80;
        server_name localhost;

        location / {
            proxy_pass http://web:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded-for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # 2. バックエンド API & WebSocket (ポート 8000)
    server {
        listen 8000;
        server_name localhost;

        location / {
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded-for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # チャットのリアルタイム更新（WebSocket）に必要な設定
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # 接続切れを防ぐためのタイムアウト延長
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }
    }

    # 3. Autumn [ファイルサーバ] (ポート 3002)
    server {
        listen 3002;
        server_name localhost;

        location / {
            proxy_pass http://autumn:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded-for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # 画像やファイルのアップロード上限（デフォルトは1MBなので20MBに拡大）
            client_max_body_size 20M;
        }
    }

    # 4. January [リンクプレビュー] (ポート 3004)
    server {
        listen 3004;
        server_name localhost;

        location / {
            proxy_pass http://january:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded-for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}