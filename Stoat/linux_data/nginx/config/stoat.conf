# ENABLE_REVERSE_PROXY=y にした場合、Stoat側のCaddyは ホストの 127.0.0.1:8880 でだけ待受します。
# (compose.override.yml が generate_config.sh によって自動生成され、caddyのportsが 8880:80 に上書きされます)
#
# 新アーキテクチャでは web/api/events/autumn/january/gifbox/livekit が
# 全て1つのドメイン配下のパスに統合されているため、
# 旧nginx.conf のようにポートごとにサーバーブロックを分ける必要はありません。
# 証明書取得(certbot等)とルーティングはこのnginxが担当し、
# バックエンドは丸ごと Caddy (host.docker.internal:8880) に流すだけでOKです。
#
# 注意: このnginxはDockerコンテナとして動いているため、
# "127.0.0.1" ではホスト(=Caddyが実際に待受しているマシン)には届きません。
# compose.yml で追加した extra_hosts (host.docker.internal -> host-gateway) 経由で参照します。

server {
    listen 80;
    listen 443 ssl http2;
    server_name raspi5.lan; # .envのDOMAINと合わせる

    # ssl_certificate     /etc/letsencrypt/live/raspi5.lan/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/raspi5.lan/privkey.pem;

    location / {
        proxy_pass http://host.docker.internal:8880;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket (チャットのリアルタイム更新)
    location /ws {
        proxy_pass http://host.docker.internal:8880;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }

    # LiveKit (音声/ビデオ通話のシグナリング)
    location /livekit {
        proxy_pass http://host.docker.internal:8880;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }
}

# 注意: LiveKitの音声/映像自体のRTC通信(7881/tcp, 50000-50100/udp)は
# nginxを経由せず、Stoat側compose.ymlの ports 設定でホストに直接公開されます。
# ufw等のファイアウォールでこのポート帯も開けておいてください。
