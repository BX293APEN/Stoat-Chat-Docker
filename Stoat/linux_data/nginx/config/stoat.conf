# ENABLE_REVERSE_PROXY=y にした場合、Stoat側のCaddyは ホストの 127.0.0.1:8880 でだけ待受します。
# (compose.override.yml が generate_config.sh によって自動生成され、caddyのportsが 8880:80 に上書きされます)
#
# 新アーキテクチャでは web/api/events/autumn/january/gifbox/livekit が
# 全て1つのドメイン配下のパスに統合されているため、
# 旧nginx.conf のようにポートごとにサーバーブロックを分ける必要はありません。
# 証明書取得(certbot等)とルーティングはこのnginxが担当し、
# バックエンドは丸ごと Caddy (host.docker.internal:8880) に流すだけでOKです。
#
# 注意: このnginxはDockerコンテナとして動いているため、
# "127.0.0.1" ではホスト(=Caddyが実際に待受しているマシン)には届きません。
# compose.yml で追加した extra_hosts (host.docker.internal -> host-gateway) 経由で参照します。


# ---- IPアドレス直打ち・不明なHostでのアクセスを拒否 ----
# server_name に一致しないリクエスト(IPアドレス直打ちや知らないHostヘッダ)は
# 全てこの default_server ブロックが拾い、接続ごと切断する。
# 444 は nginx 独自のステータスで、レスポンスを返さずコネクションを切る
# (403だと「サーバーはあるが拒否された」ことが分かってしまうので、
#  存在自体を悟られたくない場合は444の方が向いている)
server {
    listen 80 default_server;
    server_name _;
    return 444;
}

# ---- HTTP (:80) ----
# 証明書を取るまではこのブロックだけで動く状態にしてある。
# listen ... ssl を証明書なしで生かしたままにするとnginxが起動を拒否するため、
# HTTPSブロックは丸ごとコメントアウトしてある(下部参照)。
server {
    listen 80;
    server_name raspi5.lan; # .envのDOMAINと合わせる

    # certbot webroot認証用(certbotを別途動かす場合はこのパスをvolumeで共有する)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://host.docker.internal:8880;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket (チャットのリアルタイム更新)
    location /ws {
        proxy_pass http://host.docker.internal:8880;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }

    # LiveKit (音声/ビデオ通話のシグナリング)
    location /livekit {
        proxy_pass http://host.docker.internal:8880;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }
}

# ---- HTTPS (:443) ----
# 証明書を取得したら、この行以下のコメントを外して有効化する。
# (compose.ymlのnginxサービスに証明書ディレクトリのマウントを追加するのを忘れずに)
#
# 注意: TLSはHTTPのHostヘッダより前段の「SNI」でルーティングされるため、
# 443番でも同様にIP直打ちを拒否したい場合は default_server 用の証明書が別途必要。
# (SNIが無い/一致しないアクセスに対して、TLSハンドシェイクの時点で
#  どの証明書を提示するか決める必要があるため)
