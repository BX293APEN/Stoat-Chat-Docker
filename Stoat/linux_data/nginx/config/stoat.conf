# ENABLE_REVERSE_PROXY=y にした場合、Stoat側のCaddyは ホストの 127.0.0.1:8880 でだけ待受します。
# (compose.override.yml が generate_config.sh によって自動生成され、caddyのportsが 8880:80 に上書きされます)
#
# 新アーキテクチャでは web/api/events/autumn/january/gifbox/livekit が
# 全て1つのドメイン配下のパスに統合されているため、
# 旧nginx.conf のようにポートごとにサーバーブロックを分ける必要はありません。
# 証明書取得(certbot等)とルーティングはこのnginxが担当し、
# バックエンドは丸ごと Caddy (host.docker.internal:8880) に流すだけでOKです。
#
# 注意: このnginxはDockerコンテナとして動いているため、
# "127.0.0.1" ではホスト(=Caddyが実際に待受しているマシン)には届きません。
# compose.yml で追加した extra_hosts (host.docker.internal -> host-gateway) 経由で参照します。


# ---- IPアドレス直打ち・不明なHostでのアクセスを拒否 ----
# server_name に一致しないリクエスト(IPアドレス直打ちや知らないHostヘッダ)は
# 全てこの default_server ブロックが拾い、接続ごと切断する。
# 444 は nginx 独自のステータスで、レスポンスを返さずコネクションを切る
# (403だと「サーバーはあるが拒否された」ことが分かってしまうので、
#  存在自体を悟られたくない場合は444の方が向いている)
server {
    listen 80 default_server;
    server_name _;
    return 444;
}

# ---- HTTP (:80) ----
# 証明書を取るまではこのブロックだけで動く状態にしてある。
# listen ... ssl を証明書なしで生かしたままにするとnginxが起動を拒否するため、
# HTTPSブロックは丸ごとコメントアウトしてある(下部参照)。
server {
    listen 80;
    server_name raspi5.lan; # .envのDOMAINと合わせる

    # certbot webroot認証用(certbotを別途動かす場合はこのパスをvolumeで共有する)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://host.docker.internal:8880;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket (チャットのリアルタイム更新)
    location /ws {
        proxy_pass http://host.docker.internal:8880;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }

    # LiveKit (音声/ビデオ通話のシグナリング)
    location /livekit {
        proxy_pass http://host.docker.internal:8880;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }
}

# ---- IPアドレス直打ち・不明なHostでのアクセスを拒否 (:443) ----
# 自己署名証明書なので、Let's Encryptのように「ドメインごとの証明書」を
# 別途用意する必要はない。同じ証明書をdefault_server側にも使い回せばOK。
server {
    listen 443 ssl default_server;
    server_name _;

    ssl_certificate     /etc/nginx/certs/certificate.crt;
    ssl_certificate_key /etc/nginx/certs/private.key;

    return 444;
}

# ---- HTTPS (:443) ----
server {
    listen 443 ssl;
    server_name raspi5.lan; # .envのDOMAINと合わせる

    ssl_certificate     /etc/nginx/certs/certificate.crt;
    ssl_certificate_key /etc/nginx/certs/private.key;

    location / {
        proxy_pass http://host.docker.internal:8880;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws {
        proxy_pass http://host.docker.internal:8880;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }

    location /livekit {
        proxy_pass http://host.docker.internal:8880;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }
}

# 参考: 本番でLet's Encryptなど公的CAの証明書に切り替える場合は、
# 上の ssl_certificate / ssl_certificate_key のパスを差し替えるだけでよい。

# 注意: LiveKitの音声/映像自体のRTC通信(7881/tcp, 50000-50100/udp)は
# nginxを経由せず、Stoat側compose.ymlの ports 設定でホストに直接公開されます。
# ufw等のファイアウォールでこのポート帯も開けておいてください。
