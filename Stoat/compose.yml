services:
  # Nginx制御
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "8000:8000"
      - "3002:3002"
      - "3004:3004"
    volumes:
      - ${VOLUME}/nginx/config/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - api
      - autumn
      - january
    restart: always

  web:
    image: ghcr.io/revoltchat/client:latest
    environment:
      - VITE_API_URL=http://${DOMAIN}:8000
    depends_on:
      - api

  api:
    image: ghcr.io/revoltchat/api:latest
    environment:
      - REVOLT_MONGO_URI=mongodb://mongo:27017/revolt
      - REVOLT_REDIS_URI=redis://redis:6379/
      - REVOLT_APP_URL=http://${DOMAIN}
      - REVOLT_PUBLIC_URL=http://${DOMAIN}:8000
    depends_on:
      - mongo
      - redis

  autumn:
    image: ghcr.io/revoltchat/autumn:latest
    environment:
      - MONGO_URI=mongodb://mongo:27017/revolt
    depends_on:
      - mongo

  january:
    image: ghcr.io/revoltchat/january:latest

  mongo:
    image: mongo:6
    restart: always
    volumes:
      - ${VOLUME}/mongo:/data/db

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - ${VOLUME}/redis:/data